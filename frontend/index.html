<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobRadar — AI-Powered Job Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:           #080808;
      --surface:      #0f0f0f;
      --card:         #141414;
      --card-hover:   #1a1a1a;
      --border:       #262626;
      --border-light: rgba(255,255,255,0.05);
      --accent:       #0ea5e9;
      --accent-dim:   rgba(14,165,233,0.1);
      --accent-glow:  rgba(14,165,233,0.22);
      --cyan:         #38bdf8;
      --cyan-dim:     rgba(56,189,248,0.08);
      --t1:           #f1f5f9;
      --t2:           #94a3b8;
      --t3:           #4b5563;
      --t4:           #2d3748;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--t1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    /* ── Background ambience ── */
    .app-bg {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(14,165,233,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(56,189,248,0.04) 0%, transparent 55%);
    }

    /* ── Gradient text ── */
    .g-text {
      background: linear-gradient(135deg, #e0f2fe 0%, #7dd3fc 40%, #0ea5e9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Header accent ── */
    .header-glow {
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(14,165,233,0.4) 35%,
        rgba(56,189,248,0.25) 65%,
        transparent 100%);
      height: 1px;
    }

    /* ── Card base ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    /* ── Job card with left accent on hover ── */
    .job-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, transform 0.15s;
    }
    .job-card::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--cyan));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .job-card:hover {
      border-color: rgba(14,165,233,0.3);
      background: var(--card-hover);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(14,165,233,0.07);
      transform: translateY(-1px);
    }
    .job-card:hover::after { opacity: 1; }

    /* ── Input / select ── */
    .inp {
      width: 100%;
      padding: 7px 11px;
      font-size: 12.5px;
      color: var(--t1);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .inp::placeholder { color: var(--t4); }
    .inp:focus {
      border-color: rgba(14,165,233,0.5);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.08);
    }
    select.inp { appearance: none; -moz-appearance: none; cursor: pointer; }
    textarea.inp { resize: vertical; }

    /* ── Range slider ── */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input[type=range]::-moz-range-thumb {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px;
      font-size: 12.5px; font-weight: 600;
      border-radius: 8px; border: none;
      cursor: pointer; outline: none;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .btn-primary:hover { background: #0284c7; box-shadow: 0 4px 20px rgba(14,165,233,0.35); transform: translateY(-1px); }
    .btn-primary:active { transform: none; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      background: transparent;
      color: var(--t2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--t1); border-color: #3a3a3a; background: rgba(255,255,255,0.03); }

    .btn-apply {
      background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 100%);
      color: #fff;
      box-shadow: 0 2px 14px rgba(14,165,233,0.25);
    }
    .btn-apply:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(14,165,233,0.35); }
    .btn-apply:active { transform: none; }

    /* ── Toggle chip ── */
    .chip {
      padding: 5px 9px;
      font-size: 11.5px; font-weight: 500;
      border-radius: 7px;
      border: 1px solid var(--border);
      color: var(--t3);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      font-family: inherit;
    }
    .chip:hover { border-color: #3a3a3a; color: var(--t2); }
    .chip.on { border-color: rgba(14,165,233,0.4); background: var(--accent-dim); color: #7dd3fc; }

    /* ── Section label ── */
    .lbl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--t3);
    }

    /* ── Badge / pill ── */
    .pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px;
      font-size: 10.5px; font-weight: 500;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    /* ── Chip tag (location / date) ── */
    .meta-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--t3);
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
    }

    /* ── Nav tab ── */
    .nav-tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      font-size: 13px; font-weight: 500;
      border-radius: 8px;
      color: var(--t3);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .nav-tab:hover { color: var(--t2); }
    .nav-tab.on {
      color: var(--t1);
      background: var(--accent-dim);
      border-color: rgba(14,165,233,0.2);
    }

    /* ── Spinners ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin  { width: 34px; height: 34px; border: 2.5px solid var(--border); border-top-color: #0ea5e9; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .spin-sm { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skel {
      background: linear-gradient(90deg, var(--border) 25%, #252845 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 6px;
    }

    /* ── Fade in ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.22s ease; }

    /* ── Stat card ── */
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .stat-card:hover { border-color: rgba(14,165,233,0.3); background: var(--card-hover); }
    .stat-card.on    { border-color: rgba(14,165,233,0.4); background: var(--card-hover); box-shadow: 0 0 0 1px rgba(14,165,233,0.1); }

    /* ── Logo icon ── */
    .logo-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(14,165,233,0.3);
    }

    /* ── Company avatar ── */
    .company-av {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: rgba(14,165,233,0.08);
      border: 1px solid rgba(14,165,233,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      color: #38bdf8;
      flex-shrink: 0;
      user-select: none;
    }

    /* ── Pulse dot ── */
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>

<body class="min-h-screen app-bg" x-data="jobRadar()" x-init="init()">

  <!-- ═══════════════════════ AUTH LOADING ═══════════════════════ -->
  <div x-show="authLoading" class="fixed inset-0 z-50 flex items-center justify-center" style="background:var(--bg)">
    <div class="flex flex-col items-center gap-5">
      <svg width="52" height="52" viewBox="80 60 80 80" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="lg-load" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4F46E5"/><stop offset="100%" stop-color="#06B6D4"/></linearGradient></defs>
        <rect x="80" y="60" width="80" height="80" rx="16" fill="url(#lg-load)"/>
        <circle cx="120" cy="100" r="28" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
        <circle cx="120" cy="100" r="20" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
        <circle cx="120" cy="100" r="12" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
        <circle cx="120" cy="100" r="4" fill="#fff"/>
        <line x1="120" y1="100" x2="138" y2="82" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="138" cy="82" r="3" fill="#FCD34D"/>
      </svg>
      <div class="spin"></div>
      <p style="color:var(--t2);font-size:13px;font-weight:500">Loading JobRadar…</p>
    </div>
  </div>

  <!-- ═══════════════════════ LOGIN ═══════════════════════ -->
  <div x-show="!authLoading && !user" x-cloak
       class="min-h-screen flex items-center justify-center px-4 py-16">

    <!-- Background orbs -->
    <div class="pointer-events-none fixed inset-0 overflow-hidden" aria-hidden="true">
      <div class="absolute -top-48 left-1/2 -translate-x-1/2 w-[600px] h-[600px] rounded-full"
           style="background:radial-gradient(circle,rgba(14,165,233,0.12) 0%,transparent 65%)"></div>
      <div class="absolute -bottom-48 right-0 w-[400px] h-[400px] rounded-full"
           style="background:radial-gradient(circle,rgba(34,211,238,0.07) 0%,transparent 65%)"></div>
    </div>

    <div class="relative w-full max-w-[400px]">
      <div class="card px-8 py-10 flex flex-col items-center gap-7" style="backdrop-filter:blur(16px);background:rgba(10,10,10,0.92)">

        <!-- Logo -->
        <div class="flex flex-col items-center gap-3">
          <svg width="260" height="84" viewBox="80 55 520 110" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="lg-login" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4F46E5"/><stop offset="100%" stop-color="#06B6D4"/></linearGradient></defs>
            <rect x="80" y="60" width="80" height="80" rx="16" fill="url(#lg-login)"/>
            <circle cx="120" cy="100" r="28" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
            <circle cx="120" cy="100" r="20" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
            <circle cx="120" cy="100" r="12" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
            <circle cx="120" cy="100" r="4" fill="#fff"/>
            <line x1="120" y1="100" x2="138" y2="82" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="138" cy="82" r="3" fill="#FCD34D"/>
            <text x="180" y="110" font-family="'Segoe UI',system-ui,sans-serif" font-size="48" font-weight="700" fill="#f1f5f9">Job</text>
            <text x="270" y="110" font-family="'Segoe UI',system-ui,sans-serif" font-size="48" font-weight="700" fill="url(#lg-login)">Radar</text>
            <text x="180" y="138" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="400" fill="#475569" letter-spacing="2">NEVER MISS A JOB AGAIN</text>
          </svg>
        </div>

        <div class="w-full h-px" style="background:linear-gradient(90deg,transparent,rgba(14,165,233,0.3),transparent)"></div>

        <!-- Feature list -->
        <ul class="w-full space-y-3">
          <template x-for="feat in [
            'Search across 9 live job platforms at once',
            'Filter by country, work mode &amp; experience',
            'Track and manage your applications'
          ]">
            <li class="flex items-center gap-3 text-sm" style="color:var(--t2)">
              <span class="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0"
                    style="background:var(--accent-dim);border:1px solid rgba(14,165,233,0.35)">
                <svg width="9" height="9" viewBox="0 0 12 10" fill="none">
                  <path d="M1 5l3 3L11 1" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span x-html="feat"></span>
            </li>
          </template>
        </ul>

        <!-- Auth error -->
        <template x-if="authError">
          <div class="w-full flex items-start gap-2.5 rounded-lg px-3.5 py-3"
               style="border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.07)">
            <svg class="w-4 h-4 flex-shrink-0 mt-0.5" style="color:#f87171" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p class="text-xs leading-relaxed" style="color:#f87171" x-text="authError"></p>
          </div>
        </template>

        <!-- Google sign-in -->
        <a href="/auth/google"
           class="w-full flex items-center justify-center gap-3 rounded-xl bg-white px-5 py-3 font-semibold text-sm text-gray-700 shadow-lg hover:bg-gray-50 hover:shadow-xl active:scale-[0.98] transition-all duration-150 select-none">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </a>

        <p class="text-xs" style="color:var(--t4)">Secure OAuth · No passwords stored</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════ MAIN APP ═══════════════════════ -->
  <div x-show="!authLoading && user" x-cloak class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-40" style="background:rgba(7,8,15,0.85);backdrop-filter:blur(20px)">
      <div class="header-glow"></div>
      <div class="w-full px-4 sm:px-6 h-14 flex items-center gap-3">

        <!-- Brand -->
        <div class="flex items-center gap-2 flex-shrink-0">
          <svg width="28" height="28" viewBox="80 60 80 80" xmlns="http://www.w3.org/2000/svg">
            <defs><linearGradient id="lg-hdr" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4F46E5"/><stop offset="100%" stop-color="#06B6D4"/></linearGradient></defs>
            <rect x="80" y="60" width="80" height="80" rx="16" fill="url(#lg-hdr)"/>
            <circle cx="120" cy="100" r="28" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
            <circle cx="120" cy="100" r="20" fill="none" stroke="#fff" stroke-width="2" opacity="0.5"/>
            <circle cx="120" cy="100" r="12" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
            <circle cx="120" cy="100" r="4" fill="#fff"/>
            <line x1="120" y1="100" x2="138" y2="82" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="138" cy="82" r="3" fill="#FCD34D"/>
          </svg>
          <svg width="116" height="26" viewBox="178 68 232 52" xmlns="http://www.w3.org/2000/svg" class="hidden sm:block">
            <defs><linearGradient id="lg-txt" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4F46E5"/><stop offset="100%" stop-color="#06B6D4"/></linearGradient></defs>
            <text x="180" y="110" font-family="'Segoe UI',system-ui,sans-serif" font-size="48" font-weight="700" fill="#f1f5f9">Job</text>
            <text x="268" y="110" font-family="'Segoe UI',system-ui,sans-serif" font-size="48" font-weight="700" fill="url(#lg-txt)">Radar</text>
          </svg>
        </div>

        <div class="hidden sm:block h-4 w-px mx-1" style="background:var(--border)"></div>

        <!-- Nav tabs -->
        <nav class="flex items-center gap-1">
          <button @click="activeTab = 'search'" :class="activeTab === 'search' ? 'nav-tab on' : 'nav-tab'">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Search
          </button>
          <button @click="activeTab = 'dashboard'" :class="activeTab === 'dashboard' ? 'nav-tab on' : 'nav-tab'">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
            </svg>
            Applications
            <span x-show="applications.length > 0" x-text="applications.length"
                  class="pill" style="background:var(--accent-dim);color:#7dd3fc;border-color:rgba(14,165,233,0.25);padding:1px 6px;font-size:10px"></span>
          </button>
        </nav>

        <div class="flex-1"></div>

        <!-- User -->
        <div class="flex items-center gap-2.5">
          <!-- Resume button -->
          <button @click="resumeModal = true"
                  class="btn btn-ghost text-xs relative" style="padding:5px 10px">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            </svg>
            Resume
            <span x-show="resume"
                  class="absolute -top-1 -right-1 w-2 h-2 rounded-full"
                  style="background:#34d399"></span>
          </button>

          <img :src="user?.picture || ''"
               :alt="user?.name || 'User'"
               class="w-7 h-7 rounded-full object-cover"
               style="border:1.5px solid var(--border)"
               onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Crect width=%2232%22 height=%2232%22 rx=%2216%22 fill=%22%235c5fef%22/%3E%3C/svg%3E'" />
          <span class="text-sm font-medium hidden sm:block max-w-[90px] truncate" style="color:var(--t2)"
                x-text="user?.name?.split(' ')[0] || user?.email || ''"></span>
          <button @click="logout()" class="btn btn-ghost text-xs" style="padding:5px 10px">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign out
          </button>
        </div>
      </div>
      <div style="height:1px;background:var(--border)"></div>
    </header>

    <!-- Page content -->
    <main class="flex-1 w-full px-4 sm:px-6 py-6">

      <!-- ══════════════ JD FULL PAGE ══════════════ -->
      <div x-show="activeTab === 'search' && jobDetailOpen && selectedJob" x-cloak class="fade-up">
        <div class="max-w-4xl mx-auto">

          <!-- Back button -->
          <button @click="closeJob()" class="btn btn-ghost mb-5" style="font-size:13px;padding:7px 14px">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Back to results
          </button>

          <div class="card p-0 overflow-hidden">

            <!-- Job header -->
            <div class="p-6" style="border-bottom:1px solid var(--border)">
              <div class="flex gap-4 items-start">
                <div class="company-av" style="width:52px;height:52px;font-size:18px;border-radius:14px">
                  <span x-text="(selectedJob?.company || selectedJob?.title || '?')[0].toUpperCase()"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <h1 class="text-xl font-bold mb-1" style="color:var(--t1)" x-text="selectedJob?.title"></h1>
                  <p class="text-base font-medium mb-3" style="color:var(--t2)" x-text="selectedJob?.company"></p>
                  <div class="flex flex-wrap gap-2">
                    <template x-if="selectedJob?.location">
                      <span class="meta-tag">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        <span x-text="selectedJob?.location"></span>
                      </span>
                    </template>
                    <template x-if="selectedJob?.posted">
                      <span class="meta-tag">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        <span x-text="'Posted ' + formatDate(selectedJob?.posted)"></span>
                      </span>
                    </template>
                    <template x-if="selectedJob?.source">
                      <span :class="sourcePillClass(selectedJob?.source)" class="pill text-xs" x-text="selectedJob?.source"></span>
                    </template>
                    <template x-if="selectedJob?.salary">
                      <span class="pill text-xs" style="color:#34d399;background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.18)" x-text="selectedJob?.salary"></span>
                    </template>
                  </div>
                </div>
              </div>

              <!-- Action bar -->
              <div class="flex items-center gap-3 flex-wrap mt-5 pt-5" style="border-top:1px solid var(--border)">

                <!-- ATS -->
                <template x-if="user && resume">
                  <div class="flex items-center gap-2">
                    <template x-if="atsScores[selectedJob?.url]?.loading">
                      <button disabled class="btn btn-ghost" style="padding:7px 14px;opacity:0.7">
                        <div class="spin-sm"></div> Analyzing…
                      </button>
                    </template>
                    <template x-if="!atsScores[selectedJob?.url]">
                      <button @click="getATSScore(selectedJob)" class="btn btn-ghost" style="padding:7px 14px">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                        Get ATS Score
                      </button>
                    </template>
                    <template x-if="atsScores[selectedJob?.url] && !atsScores[selectedJob?.url].loading">
                      <div class="flex flex-col gap-1">
                        <button class="btn" :style="atsScoreStyle(atsScores[selectedJob?.url].score)" style="padding:7px 16px;cursor:default">
                          <template x-if="!atsScores[selectedJob?.url].error">
                            <span>ATS Score: <strong x-text="atsScores[selectedJob?.url].score + '%'"></strong></span>
                          </template>
                          <template x-if="atsScores[selectedJob?.url].error">
                            <span @click="getATSScore(selectedJob)" style="cursor:pointer">Retry ATS Score</span>
                          </template>
                        </button>
                        <p class="text-xs" style="color:#f87171" x-show="atsScores[selectedJob?.url].error" x-text="atsScores[selectedJob?.url].error"></p>
                      </div>
                    </template>
                  </div>
                </template>

                <template x-if="!resume && user">
                  <button @click="resumeModal = true" class="btn btn-ghost" style="padding:7px 14px;color:#fbbf24;border-color:rgba(251,191,36,0.2)">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Upload Resume for ATS Score
                  </button>
                </template>

                <div class="flex-1"></div>

                <template x-if="user">
                  <button @click="markApplied(selectedJob)"
                          :disabled="appMap[selectedJob?.url]?.status === 'applied'"
                          :style="appMap[selectedJob?.url]?.status === 'applied' ? 'border-color:rgba(52,211,153,0.35);color:#34d399;background:rgba(16,185,129,0.07)' : ''"
                          class="btn btn-ghost" style="padding:7px 14px">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    <span x-text="appMap[selectedJob?.url]?.status === 'applied' ? 'Applied ✓' : 'Mark Applied'"></span>
                  </button>
                </template>

                <a :href="selectedJob?.url" target="_blank" rel="noopener noreferrer"
                   class="btn btn-apply" style="padding:8px 20px;font-size:13px">
                  Apply on <span x-text="selectedJob?.source"></span>
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>
              </div>

              <!-- ATS breakdown when score is ready -->
              <template x-if="atsScores[selectedJob?.url]?.score !== undefined && !atsScores[selectedJob?.url]?.error">
                <div class="grid grid-cols-2 gap-4 mt-5 pt-5" style="border-top:1px solid var(--border)">
                  <div>
                    <p class="lbl mb-2">Matching Skills</p>
                    <div class="flex flex-wrap gap-1.5">
                      <template x-for="skill in (atsScores[selectedJob?.url]?.matching_skills || [])">
                        <span class="pill text-xs" style="background:rgba(52,211,153,0.1);color:#34d399;border-color:rgba(52,211,153,0.2)" x-text="skill"></span>
                      </template>
                    </div>
                  </div>
                  <div>
                    <p class="lbl mb-2">Missing Keywords</p>
                    <div class="flex flex-wrap gap-1.5">
                      <template x-for="kw in (atsScores[selectedJob?.url]?.missing_keywords || [])">
                        <span class="pill text-xs" style="background:rgba(251,191,36,0.1);color:#fbbf24;border-color:rgba(251,191,36,0.2)" x-text="kw"></span>
                      </template>
                    </div>
                  </div>
                  <template x-if="atsScores[selectedJob?.url]?.recommendation">
                    <div class="col-span-2 rounded-lg px-4 py-3" style="background:rgba(14,165,233,0.06);border:1px solid rgba(14,165,233,0.15)">
                      <p class="text-xs font-semibold mb-1" style="color:var(--accent)">Recommendation</p>
                      <p class="text-sm" style="color:var(--t2)" x-text="atsScores[selectedJob?.url].recommendation"></p>
                    </div>
                  </template>
                </div>
              </template>
            </div>

            <!-- Full JD -->
            <div class="p-6">
              <h2 class="lbl mb-4">Job Description</h2>
              <template x-if="selectedJob?.description">
                <div class="text-sm leading-relaxed whitespace-pre-wrap" style="color:var(--t2);line-height:1.8" x-text="selectedJob?.description"></div>
              </template>
              <template x-if="!selectedJob?.description">
                <div class="rounded-lg p-6 text-center" style="background:rgba(255,255,255,0.02);border:1px dashed var(--border)">
                  <p class="text-sm mb-3" style="color:var(--t3)">Full description not available in the API response.</p>
                  <a :href="selectedJob?.url" target="_blank" rel="noopener noreferrer" class="btn btn-apply" style="font-size:12px;padding:6px 16px">
                    View on <span x-text="selectedJob?.source"></span>
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                  </a>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>

      <!-- ══════════════ SEARCH TAB ══════════════ -->
      <div x-show="activeTab === 'search' && !jobDetailOpen" class="fade-up flex gap-5">

        <!-- Sidebar -->
        <aside class="w-64 flex-shrink-0 hidden lg:block">
          <div class="sticky top-20 card p-4 space-y-4 overflow-y-auto"
               style="max-height:calc(100vh - 5.5rem)">

            <div class="flex items-center gap-1.5">
              <svg class="w-3 h-3" style="color:var(--t3)" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
              </svg>
              <span class="lbl">Filters</span>
            </div>

            <!-- Job Title -->
            <div class="space-y-1.5">
              <label class="lbl">Job Title</label>
              <input x-model="params.job_title" @keydown.enter="search()" type="text"
                     placeholder="e.g. AI Engineer" class="inp" />
            </div>

            <!-- Country -->
            <div class="space-y-1.5">
              <label class="lbl">Country</label>
              <div class="relative">
                <select x-model="params.country" class="inp" style="padding-right:28px">
                  <option value="">All Europe</option>
                  <option value="de">Germany</option>
                  <option value="nl">Netherlands</option>
                  <option value="gb">United Kingdom</option>
                  <option value="fr">France</option>
                  <option value="es">Spain</option>
                  <option value="ch">Switzerland</option>
                  <option value="at">Austria</option>
                  <option value="it">Italy</option>
                  <option value="pl">Poland</option>
                </select>
                <svg class="pointer-events-none absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5"
                     style="color:var(--t3)" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
            </div>

            <!-- Work Mode -->
            <div class="space-y-1.5">
              <label class="lbl">Work Mode</label>
              <div class="grid grid-cols-2 gap-1.5">
                <template x-for="(label, val) in workModes" :key="val">
                  <button @click="params.work_mode = val"
                          :class="params.work_mode === val ? 'chip on' : 'chip'"
                          x-text="label"></button>
                </template>
              </div>
            </div>

            <!-- City -->
            <div class="space-y-1.5">
              <label class="lbl">City</label>
              <input x-model="params.location" type="text" placeholder="e.g. Berlin" class="inp" />
            </div>

            <!-- Experience Level -->
            <div class="space-y-1.5">
              <label class="lbl">Experience Level</label>
              <div class="grid grid-cols-3 gap-1.5">
                <template x-for="(label, val) in experienceLevels" :key="val">
                  <button @click="params.experience_level = val"
                          :class="params.experience_level === val ? 'chip on' : 'chip'"
                          x-text="label"></button>
                </template>
              </div>
            </div>

            <!-- Posted within -->
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="lbl">Posted within</label>
                <span class="text-xs font-bold" style="color:var(--accent)" x-text="params.days_old + 'd'"></span>
              </div>
              <input type="range" min="1" max="30" x-model.number="params.days_old" />
              <div class="flex justify-between text-xs" style="color:var(--t4)"><span>1d</span><span>30d</span></div>
            </div>

            <!-- Results / source -->
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label class="lbl">Results / source</label>
                <span class="text-xs font-bold" style="color:var(--accent)" x-text="params.max_results_per_source"></span>
              </div>
              <input type="range" min="5" max="50" step="5" x-model.number="params.max_results_per_source" />
              <div class="flex justify-between text-xs" style="color:var(--t4)"><span>5</span><span>50</span></div>
            </div>

            <!-- Search button -->
            <button @click="search()" :disabled="loading"
                    class="btn btn-primary w-full justify-center" style="padding:9px 14px">
              <template x-if="loading"><div class="spin-sm"></div></template>
              <template x-if="!loading">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </template>
              <span x-text="loading ? 'Searching…' : 'Search Jobs'"></span>
            </button>

            <!-- Sources -->
            <div class="pt-3 space-y-2" style="border-top:1px solid var(--border)">
              <span class="lbl">Live Sources</span>
              <ul class="space-y-1.5">
                <template x-for="src in activeSources" :key="src.name">
                  <li class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full flex-shrink-0 pulse-dot"
                          :style="'background:'+src.color"></span>
                    <span class="text-xs" style="color:var(--t3)" x-text="src.name"></span>
                  </li>
                </template>
              </ul>
            </div>

          </div>
        </aside>

        <!-- Results column -->
        <div class="flex-1 min-w-0 space-y-3">

          <!-- Mobile search -->
          <div class="lg:hidden flex gap-2">
            <input x-model="params.job_title" @keydown.enter="search()"
                   type="text" placeholder="Job title…" class="inp flex-1" />
            <button @click="search()" :disabled="loading" class="btn btn-primary">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </button>
          </div>

          <!-- Stats bar -->
          <template x-if="stats && searched && !loading">
            <div class="card px-4 py-2.5 flex flex-wrap items-center gap-3">
              <span class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></span>
              <span class="font-bold text-white text-sm" x-text="stats.total_jobs ?? jobs.length"></span>
              <span class="text-sm" style="color:var(--t3)">results</span>
              <template x-if="params.job_title">
                <span class="text-xs" style="color:var(--t3)">
                  for <span style="color:var(--t2);font-weight:500" x-text="'&quot;'+params.job_title+'&quot;'"></span>
                </span>
              </template>
              <template x-if="stats.query_time_ms">
                <span class="ml-auto text-xs" style="color:var(--t4)"
                      x-text="(stats.query_time_ms/1000).toFixed(2)+'s'"></span>
              </template>
            </div>
          </template>

          <!-- Error -->
          <template x-if="error && !loading">
            <div class="rounded-xl px-4 py-4 flex items-start gap-3"
                 style="border:1px solid rgba(239,68,68,0.2);background:rgba(239,68,68,0.07)">
              <svg class="w-4 h-4 flex-shrink-0 mt-0.5" style="color:#f87171" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <div>
                <p class="text-sm font-semibold" style="color:#f87171">Search failed</p>
                <p class="text-xs mt-0.5" style="color:rgba(248,113,113,0.7)" x-text="error"></p>
              </div>
            </div>
          </template>

          <!-- Loading skeletons -->
          <template x-if="loading">
            <div class="space-y-2.5">
              <template x-for="i in 6" :key="i">
                <div class="card p-4">
                  <div class="flex gap-3.5">
                    <div class="skel w-10 h-10 rounded-xl flex-shrink-0"></div>
                    <div class="flex-1 space-y-2.5">
                      <div class="skel h-4 w-3/5"></div>
                      <div class="skel h-3 w-1/4"></div>
                      <div class="flex gap-1.5 mt-1">
                        <div class="skel h-5 w-20 rounded-md"></div>
                        <div class="skel h-5 w-14 rounded-md"></div>
                        <div class="skel h-5 w-16 rounded-md"></div>
                      </div>
                    </div>
                    <div class="skel w-20 h-8 rounded-lg flex-shrink-0"></div>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Pre-search empty state -->
          <template x-if="!loading && !searched">
            <div class="flex flex-col items-center justify-center py-28 text-center">
              <div class="w-20 h-20 rounded-2xl flex items-center justify-center mb-6"
                   style="background:var(--accent-dim);border:1px solid rgba(14,165,233,0.2)">
                <svg class="w-9 h-9" style="color:var(--accent)" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </div>
              <h3 class="text-lg font-semibold mb-2" style="color:var(--t1)">Find your next role</h3>
              <p class="text-sm leading-relaxed max-w-xs" style="color:var(--t3)">
                Set your filters and search across 9 job platforms simultaneously.
              </p>
            </div>
          </template>

          <!-- No results -->
          <template x-if="!loading && searched && jobs.length === 0 && !error">
            <div class="flex flex-col items-center justify-center py-24 text-center">
              <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4"
                   style="background:rgba(255,255,255,0.03);border:1px solid var(--border)">
                <svg class="w-8 h-8" style="color:var(--t4)" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                  <circle cx="12" cy="12" r="10"/><path d="M8 8l8 8M16 8l-8 8"/>
                </svg>
              </div>
              <h3 class="text-base font-semibold mb-1" style="color:var(--t2)">No results found</h3>
              <p class="text-sm max-w-xs" style="color:var(--t3)">Try broader keywords, a different location, or a longer date range.</p>
            </div>
          </template>

          <!-- Job cards -->
          <template x-if="!loading && jobs.length > 0">
            <div class="space-y-2.5">
              <template x-for="job in jobs" :key="job.url">
                <article class="job-card p-4 pl-5">
                  <div class="flex gap-3.5 items-start">

                    <!-- Company avatar -->
                    <div class="company-av">
                      <span x-text="(job.company || job.title || '?')[0].toUpperCase()"></span>
                    </div>

                    <div class="flex-1 min-w-0">

                      <!-- Title row -->
                      <div class="flex items-start justify-between gap-3 mb-0.5">
                        <h3 class="font-semibold text-sm leading-snug cursor-pointer hover:underline"
                            style="color:var(--t1)"
                            @click="openJob(job)"
                            x-text="job.title"></h3>
                        <span :class="sourcePillClass(job.source)"
                              class="pill text-xs flex-shrink-0 mt-0.5" x-text="job.source"></span>
                      </div>

                      <!-- Company -->
                      <p class="text-xs font-medium mb-2.5" style="color:var(--t3)"
                         x-text="job.company || ''"></p>

                      <!-- Meta chips -->
                      <div class="flex flex-wrap gap-1.5 mb-3">
                        <template x-if="job.location">
                          <span class="meta-tag">
                            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
                            </svg>
                            <span x-text="job.location"></span>
                          </span>
                        </template>
                        <template x-if="job.posted">
                          <span class="meta-tag">
                            <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            <span x-text="formatDate(job.posted)"></span>
                          </span>
                        </template>
                        <template x-if="job.salary">
                          <span class="pill text-xs"
                                style="color:#34d399;background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.18)"
                                x-text="job.salary"></span>
                        </template>
                      </div>

                      <!-- Actions -->
                      <div class="flex items-center gap-2 flex-wrap">
                        <button @click="openJob(job)" class="btn btn-apply" style="font-size:12px;padding:6px 14px">
                          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                          </svg>
                          View JD
                        </button>

                        <template x-if="user">
                          <button @click="markApplied(job)"
                                  :disabled="appMap[job.url]?.status === 'applied'"
                                  :style="appMap[job.url]?.status === 'applied'
                                    ? 'border-color:rgba(52,211,153,0.35);color:#34d399;background:rgba(16,185,129,0.07)'
                                    : ''"

                        <!-- ATS Score button — only when resume is uploaded -->

                                <div class="text-xs" style="color:var(--t3);max-width:200px">

                                  </template>
                                </div>
                              </div>
                            </template>
                            <template x-if="atsScores[job.url]?.error">

                                </svg>
                                Get ATS Score
                              </button>
                            </template>
                          </div>

  <script>
    function jobRadar() {
      return {
        // ── Auth ──────────────────────────────────────────
        user: null,
        token: '',
        authLoading: true,
        authError: null,

        // ── Search ────────────────────────────────────────
        params: {
          job_title: '',
          country: '',
          location: '',
          days_old: 7,
          experience_level: '',
          work_mode: '',
          max_results_per_source: 20,
        },
        workModes: {
          '':        'All',
          'onsite':  'On-site',
          'remote':  'Remote',
          'hybrid':  'Hybrid',
        },
        experienceLevels: {
          '':       'All',
          'entry':  'Entry',
          'junior': 'Junior',
          'mid':    'Mid',
          'senior': 'Senior',
          'lead':   'Lead',
        },
        jobs: [],
        stats: null,
        loading: false,
        error: null,
        searched: false,

        // ── Dashboard ─────────────────────────────────────
        appMap: {},
        applications: [],
        appsLoading: false,
        activeTab: 'search',
        dashFilter: 'all',

        // ── Resume & ATS ──────────────────────────────────
        resume: null,
        resumeModal: false,
        resumeUploading: false,
        resumeError: null,
        atsScores: {},

        // ── Job Detail ────────────────────────────────────
        selectedJob: null,
        jobDetailOpen: false,

        // ── Static ────────────────────────────────────────
        activeSources: [
          { name: 'Adzuna',          color: '#e8410a' },
          { name: 'Remotive',        color: '#14b8a6' },
          { name: 'Arbeitnow',       color: '#7c3aed' },
          { name: 'RemoteOK',        color: '#06b6d4' },
          { name: 'Jobicy',          color: '#2563eb' },
          { name: 'Hacker News',     color: '#f97316' },
          { name: 'WeWorkRemotely',  color: '#16a34a' },
          { name: 'GraphQL Jobs',    color: '#e11d48' },
          { name: 'Working Nomads',  color: '#7c3aed' },
        ],
        filterPills: [
          { value: 'all',          label: 'All' },
          { value: 'wishlist',     label: 'Saved' },
          { value: 'applied',      label: 'Applied' },
          { value: 'interviewing', label: 'Interviewing' },
          { value: 'offer',        label: 'Offer' },
          { value: 'rejected',     label: 'Rejected' },
          { value: 'withdrawn',    label: 'Withdrawn' },
        ],

        // ─────────────────────────────────────────────────
        // LIFECYCLE
        // ─────────────────────────────────────────────────
        async init() {
          const urlParams = new URLSearchParams(window.location.search);
          const authErr = urlParams.get('auth_error');
          if (authErr) this.authError = decodeURIComponent(authErr).replace(/\+/g, ' ');

          const urlToken = urlParams.get('token');
          if (urlToken) {
            localStorage.setItem('jr_token', urlToken);
            window.history.replaceState({}, '', '/');
          }

          this.token = localStorage.getItem('jr_token') || '';

          if (this.token) {
            try {
              const res = await fetch('/auth/me', {
                headers: { 'Authorization': 'Bearer ' + this.token },
              });
              if (res.ok) {
                this.user = await res.json();
                await this.loadApplications();
                await this.loadResume();
              } else {
                localStorage.removeItem('jr_token');
                this.token = '';
              }
            } catch (e) {
              this.token = '';
            }
          }

          this.authLoading = false;
        },

        // ─────────────────────────────────────────────────
        // AUTH
        // ─────────────────────────────────────────────────
        authHeaders() {
          return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + this.token,
          };
        },

        logout() {
          localStorage.removeItem('jr_token');
          this.token = '';
          this.user = null;
          this.applications = [];
          this.appMap = {};
          this.jobs = [];
          this.searched = false;
          this.stats = null;
          this.error = null;
          this.resume = null;
          this.atsScores = {};
        },

        // ─────────────────────────────────────────────────
        // APPLICATIONS
        // ─────────────────────────────────────────────────
        async loadApplications() {
          this.appsLoading = true;
          try {
            const res = await fetch('/api/applications', { headers: this.authHeaders() });
            if (res.ok) {
              const data = await res.json();
              this.applications = Array.isArray(data) ? data : (data.applications || data.items || []);
              const map = {};
              for (const app of this.applications) {
                const key = app.url || app.job_url;
                if (key) map[key] = { id: app.id, status: app.status };
              }
              this.appMap = map;
            }
          } catch (e) {
            console.error('loadApplications error:', e);
          } finally {
            this.appsLoading = false;
          }
        },

        async saveForLater(job) {
          if (this.appMap[job.url]) return;
          try {
            const res = await fetch('/api/applications', {
              method: 'POST',
              headers: this.authHeaders(),
              body: JSON.stringify({ url: job.url, job_title: job.title, company: job.company, location: job.location, source: job.source, status: 'wishlist' }),
            });
            if (res.ok) {
              const app = await res.json();
              this.appMap = { ...this.appMap, [job.url]: { id: app.id, status: 'wishlist' } };
              this.applications = [app, ...this.applications];
            }
          } catch (e) { console.error('saveForLater error:', e); }
        },

        async markApplied(job) {
          const existing = this.appMap[job.url];
          try {
            if (existing && existing.status !== 'applied') {
              const res = await fetch('/api/applications/' + existing.id, {
                method: 'PATCH', headers: this.authHeaders(),
                body: JSON.stringify({ status: 'applied' }),
              });
              if (res.ok) {
                this.appMap = { ...this.appMap, [job.url]: { ...existing, status: 'applied' } };
                const idx = this.applications.findIndex(a => a.id === existing.id);
                if (idx !== -1) { this.applications[idx] = { ...this.applications[idx], status: 'applied' }; this.applications = [...this.applications]; }
              }
            } else if (!existing) {
              const res = await fetch('/api/applications', {
                method: 'POST', headers: this.authHeaders(),
                body: JSON.stringify({ url: job.url, job_title: job.title, company: job.company, location: job.location, source: job.source, status: 'applied' }),
              });
              if (res.ok) {
                const app = await res.json();
                this.appMap = { ...this.appMap, [job.url]: { id: app.id, status: 'applied' } };
                this.applications = [app, ...this.applications];
              }
            }
          } catch (e) { console.error('markApplied error:', e); }
        },

        async updateStatus(app, status) {
          try {
            const res = await fetch('/api/applications/' + app.id, {
              method: 'PATCH', headers: this.authHeaders(),
              body: JSON.stringify({ status }),
            });
            if (res.ok) {
              app.status = status;
              const key = app.url || app.job_url;
              if (key && this.appMap[key]) this.appMap = { ...this.appMap, [key]: { ...this.appMap[key], status } };
            }
          } catch (e) { console.error('updateStatus error:', e); }
        },

        async updateNotes(app, notes) {
          try {
            const res = await fetch('/api/applications/' + app.id, {
              method: 'PATCH', headers: this.authHeaders(),
              body: JSON.stringify({ notes }),
            });
            if (res.ok) app.notes = notes;
          } catch (e) { console.error('updateNotes error:', e); }
        },

        async deleteApplication(id) {
          try {
            const res = await fetch('/api/applications/' + id, {
              method: 'DELETE', headers: this.authHeaders(),
            });
            if (res.ok || res.status === 204) {
              const app = this.applications.find(a => a.id === id);
              if (app) { const key = app.url || app.job_url; if (key) { const map = { ...this.appMap }; delete map[key]; this.appMap = map; } }
              this.applications = this.applications.filter(a => a.id !== id);
            }
          } catch (e) { console.error('deleteApplication error:', e); }
        },

        // ─────────────────────────────────────────────────
        // SEARCH
        // ─────────────────────────────────────────────────
        async search() {
          if (this.loading) return;
          this.loading = true;
          this.error = null;
          this.jobs = [];
          this.stats = null;
          try {
            const res = await fetch('/api/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.params),
            });
            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.detail || errData.message || `Server error ${res.status}`);
            }
            const data = await res.json();
            this.jobs = Array.isArray(data) ? data : (data.jobs || data.results || []);
            this.stats = data.stats || { total_jobs: this.jobs.length };
            this.searched = true;
          } catch (e) {
            this.error = e.message || 'An unexpected error occurred. Please try again.';
            this.searched = true;
          } finally {
            this.loading = false;
          }
        },

        // ─────────────────────────────────────────────────
        // COMPUTED
        // ─────────────────────────────────────────────────
        get filteredApplications() {
          if (this.dashFilter === 'all') return this.applications;
          return this.applications.filter(a => a.status === this.dashFilter);
        },

        get dashboardStats() {
          const total = this.applications.length;
          const count = s => this.applications.filter(a => a.status === s).length;
          return [
            { label: 'Total',        filter: 'all',          count: total,             badgeClass: 'bg-slate-700/60 text-slate-300',       barClass: 'bg-slate-400' },
            { label: 'Applied',      filter: 'applied',      count: count('applied'),      badgeClass: 'bg-blue-500/20 text-blue-400',         barClass: 'bg-blue-500' },
            { label: 'Interviewing', filter: 'interviewing', count: count('interviewing'), badgeClass: 'bg-yellow-500/20 text-yellow-400',     barClass: 'bg-yellow-500' },
            { label: 'Offers',       filter: 'offer',        count: count('offer'),        badgeClass: 'bg-emerald-500/20 text-emerald-400',   barClass: 'bg-emerald-500' },
            { label: 'Rejected',     filter: 'rejected',     count: count('rejected'),     badgeClass: 'bg-red-500/20 text-red-400',           barClass: 'bg-red-500' },
          ];
        },

        // ─────────────────────────────────────────────────
        // HELPERS
        // ─────────────────────────────────────────────────
        sourcePillClass(source) {
          if (!source) return 'bg-slate-700/40 text-slate-400 border-slate-600/60';
          const s = source.toLowerCase();
          if (s.includes('adzuna'))       return 'bg-orange-500/10 text-orange-400 border-orange-500/20';
          if (s.includes('remotive'))     return 'bg-cyan-500/10 text-cyan-400 border-cyan-500/20';
          if (s.includes('arbeitnow'))    return 'bg-violet-500/10 text-violet-400 border-violet-500/20';
          if (s.includes('remoteok'))     return 'bg-sky-500/10 text-sky-400 border-sky-500/20';
          if (s.includes('jobicy'))       return 'bg-blue-500/10 text-blue-400 border-blue-500/20';
          if (s.includes('hacker'))       return 'bg-orange-400/10 text-orange-300 border-orange-400/20';
          if (s.includes('weworkremote')) return 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';
          if (s.includes('graphql'))      return 'bg-rose-500/10 text-rose-400 border-rose-500/20';
          if (s.includes('nomad'))        return 'bg-purple-500/10 text-purple-400 border-purple-500/20';
          return 'bg-slate-700/40 text-slate-400 border-slate-600/60';
        },

        statusClass(status) {
          const map = {
            wishlist:     'bg-slate-700/50 text-slate-300 border-slate-600/50',
            applied:      'bg-blue-500/12 text-blue-400 border-blue-500/25',
            interviewing: 'bg-yellow-500/12 text-yellow-400 border-yellow-500/25',
            offer:        'bg-emerald-500/12 text-emerald-400 border-emerald-500/25',
            rejected:     'bg-red-500/12 text-red-400 border-red-500/25',
            withdrawn:    'bg-slate-600/25 text-slate-500 border-slate-600/35',
          };
          return map[status] || 'bg-slate-700/50 text-slate-300 border-slate-600/50';
        },

        statusSelectClass(status) {
          const map = {
            wishlist:     'text-slate-300',
            applied:      'text-blue-400',
            interviewing: 'text-yellow-400',
            offer:        'text-emerald-400',
            rejected:     'text-red-400',
            withdrawn:    'text-slate-500',
          };
          return map[status] || 'text-slate-300';
        },

        formatDate(s) {
          if (!s) return '';
          try {
            const d = new Date(s);
            if (isNaN(d.getTime())) return s;
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
          } catch (_) { return s; }
        },

        // ─────────────────────────────────────────────────
        // RESUME
        // ─────────────────────────────────────────────────
        async loadResume() {
          try {
            const res = await fetch('/api/resume', { headers: this.authHeaders() });
            if (res.ok) this.resume = await res.json();
          } catch (e) {}
        },

        async uploadResume(event) {
          const file = event.target.files[0];
          if (!file) return;
          this.resumeUploading = true;
          this.resumeError = null;
          try {
            const fd = new FormData();
            fd.append('file', file);
            const res = await fetch('/api/resume', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + this.token },
              body: fd,
            });
            if (res.ok) {
              const data = await res.json();
              await this.loadResume();
              this.atsScores = {};
            } else {
              const err = await res.json().catch(() => ({}));
              this.resumeError = err.detail || 'Upload failed';
            }
          } catch (e) {
            this.resumeError = 'Upload failed — please try again';
          } finally {
            this.resumeUploading = false;
            event.target.value = '';
          }
        },

        async deleteResume() {
          try {
            await fetch('/api/resume', { method: 'DELETE', headers: this.authHeaders() });
            this.resume = null;
            this.atsScores = {};
          } catch (e) {}
        },

        // ─────────────────────────────────────────────────
        // ATS SCORING
        // ─────────────────────────────────────────────────
        async getATSScore(job) {
          if (!this.resume) return;
          this.atsScores = { ...this.atsScores, [job.url]: { loading: true } };
          try {
            const res = await fetch('/api/ats-score', {
              method: 'POST',
              headers: this.authHeaders(),
              body: JSON.stringify({
                job_title: job.title,
                company: job.company || '',
                job_description: job.description || job.title,
              }),
            });
            if (res.ok) {
              const data = await res.json();
              this.atsScores = { ...this.atsScores, [job.url]: { ...data, loading: false } };
            } else {
              const err = await res.json().catch(() => ({}));
              this.atsScores = { ...this.atsScores, [job.url]: { error: err.detail || `Error ${res.status}`, loading: false } };
            }
          } catch (e) {
            this.atsScores = { ...this.atsScores, [job.url]: { error: e.message || 'Failed', loading: false } };
          }
        },

        openJob(job) {
          this.selectedJob = job;
          this.jobDetailOpen = true;
          window.scrollTo(0, 0);
        },

        closeJob() {
          this.jobDetailOpen = false;
          this.selectedJob = null;
        },

        atsScoreStyle(score) {
          if (score >= 70) return 'background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(52,211,153,0.3)';
          if (score >= 40) return 'background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)';
          return 'background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.3)';
        },
      };
    }
  </script>
</body>
